server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/safecode
    username: safecode_user
    password: yourPassword
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

logging:
  level:
    org.springframework: INFO
